<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eduardo es gay?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at top left, #1a1a3e 0%, #0d0d1f 60%, #0a0a18 100%);
      color: #fff;
    }

    .card {
      background: rgba(30, 30, 80, 0.85);
      border: 1px solid rgba(100, 100, 200, 0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 90%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #7b8cff;
      margin-bottom: 2.5rem;
    }

    #btn-area {
      position: relative;
      width: 100%;
      height: 180px;
      margin-bottom: 1.5rem;
    }

    button {
      position: absolute;
      padding: 12px 36px;
      font-size: 16px;
      font-weight: 500;
      background: rgba(20, 20, 60, 0.8);
      border: 1px solid rgba(100, 100, 200, 0.35);
      border-radius: 10px;
      color: #c0c8ff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover { background: rgba(50, 50, 120, 0.8); border-color: rgba(120,120,255,0.5); }

    #btn-si { left: calc(50% - 130px); top: 50%; transform: translateY(-50%); }
    #btn-no { left: calc(50% + 20px); top: 50%; transform: translateY(-50%); }

    #msg {
      font-size: 24px;
      font-weight: 700;
      min-height: 36px;
      margin-top: 0.5rem;
    }

    #msg.neon {
      color: #4ade80;
      text-shadow:
        0 0 6px #4ade80,
        0 0 12px #4ade80,
        0 0 24px #22c55e,
        0 0 48px #16a34a;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 6px #4ade80, 0 0 12px #4ade80, 0 0 24px #22c55e, 0 0 48px #16a34a; }
      50%       { text-shadow: 0 0 10px #4ade80, 0 0 22px #4ade80, 0 0 40px #22c55e, 0 0 70px #16a34a; }
    }

    .footer {
      margin-top: 2rem;
      font-size: 12px;
      color: rgba(150, 150, 220, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Eduardo es gay?</h1>

    <div id="btn-area">
      <button id="btn-si">Si</button>
      <button id="btn-no">No</button>
    </div>

    <div id="msg"></div>
    <div class="footer">La verdad siempre sale a la luz</div>
  </div>

  <script>
    const btnNo = document.getElementById('btn-no');
    const btnSi = document.getElementById('btn-si');
    const area  = document.getElementById('btn-area');
    const msg   = document.getElementById('msg');

    function getRandom(min, max) { return Math.random() * (max - min) + min; }
    function isNear(mx, my, bx, by, dist) { return Math.hypot(mx - bx, my - by) < dist; }

    function moveBtn(btn, mouseX, mouseY) {
      const ar = area.getBoundingClientRect();
      const bw = btn.offsetWidth, bh = btn.offsetHeight;
      let newLeft, newTop, attempts = 0;
      do {
        newLeft = getRandom(0, ar.width - bw);
        newTop  = getRandom(0, ar.height - bh);
        attempts++;
      } while (attempts < 20 && isNear(mouseX - ar.left, mouseY - ar.top, newLeft + bw/2, newTop + bh/2, 120));
      btn.style.left = newLeft + 'px';
      btn.style.top  = newTop  + 'px';
      btn.style.transform = 'none';
    }

    document.addEventListener('mousemove', (e) => {
      const ar = area.getBoundingClientRect();
      const mx = e.clientX - ar.left, my = e.clientY - ar.top;
      const bx = btnNo.offsetLeft + btnNo.offsetWidth  / 2;
      const by = btnNo.offsetTop  + btnNo.offsetHeight / 2;
      if (isNear(mx, my, bx, by, 100)) moveBtn(btnNo, e.clientX, e.clientY);
    });

    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      moveBtn(btnNo, t.clientX, t.clientY);
    });

    btnSi.addEventListener('click', () => {
      msg.textContent = 'En efecto eres gay';
      msg.classList.add('neon');
    });
    btnNo.addEventListener('click', () => {
      msg.textContent = 'Como llegaste a darle click??';
      msg.classList.remove('neon');
    });
  </script>
</body>
</html>
